<style>
/* ============================================================
   ZAPTIX — PREMIUM ARCADE TECH DESIGN SYSTEM
   ============================================================ */

:root {
  --z-primary: #0066FF;
  --z-primary-dark: #0047CC;
  --z-primary-glow: rgba(0, 102, 255, 0.4);
  --z-secondary: #00CFFF;
  --z-accent: #FF6B00;
  --z-neon-green: #39FF14;
  --z-neon-purple: #B026FF;

  --z-bg: #080B12;
  --z-bg-2: #0D1220;
  --z-surface: #111827;
  --z-surface-2: #1a2235;
  --z-card: #0F1929;

  --z-border: rgba(255,255,255,0.07);
  --z-border-accent: rgba(0, 102, 255, 0.3);

  --z-text: #E8EEFF;
  --z-text-muted: rgba(232, 238, 255, 0.55);
  --z-text-subtle: rgba(232, 238, 255, 0.3);

  --cat-primary: #0066FF;
  --cat-secondary: #00CFFF;
  --cat-accent: #FF6B00;
  --cat-glow: rgba(0, 102, 255, 0.5);
  --cat-bg: #080B12;
  --cat-surface: #0D1220;
  --cat-border: rgba(0, 102, 255, 0.2);
  --cat-text-accent: #60A5FA;
  --cat-gradient: linear-gradient(135deg, #0066FF, #00CFFF);

  --gap-xs: 0.5rem;
  --gap-sm: 1rem;
  --gap-md: 1.5rem;
  --gap-lg: 2.5rem;
  --gap-xl: 4rem;
  --gap-2xl: 6rem;

  --font-display: 'Orbitron', sans-serif;
  --font-ui: 'Exo 2', sans-serif;
  --font-arabic: 'IBM Plex Sans Arabic', sans-serif;
  --font-mono: 'Space Mono', monospace;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --r-xl: 24px;
  --r-full: 9999px;

  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  background: var(--z-bg);
  color: var(--z-text);
  font-family: var(--font-arabic);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}
body.old-tech-active {
  --z-bg: #05000F;
  --z-bg-2: #0A0020;
  --z-surface: #0F0028;
  --z-card: #120030;
  --z-border: rgba(176, 38, 255, 0.12);
  --cat-primary: #B026FF;
  --cat-secondary: #39FF14;
  --cat-glow: rgba(176, 38, 255, 0.5);
  --cat-gradient: linear-gradient(135deg, #B026FF, #39FF14);
  --cat-text-accent: #B026FF;
  background: var(--z-bg);
}
img { max-width: 100%; display: block; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, textarea, select { font-family: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--z-bg); }
::-webkit-scrollbar-thumb { background: var(--cat-primary); border-radius: 2px; }
::selection { background: var(--cat-primary); color: #fff; }

.arcade-grid-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,102,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,102,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
}
.old-tech-active .arcade-grid-bg {
  background-image:
    linear-gradient(rgba(176,38,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.scanlines-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
  );
}
.old-tech-active .scanlines-overlay { display: block; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
}

.container { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 1.25rem; position: relative; z-index: 2; }
.section { padding: var(--gap-xl) 0; }
.section--sm { padding: var(--gap-lg) 0; }

.display-text { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
.brand-text { font-family: var(--font-display); letter-spacing: 0.1em; }
.mono-text { font-family: var(--font-mono); }

.glow-blue { text-shadow: 0 0 20px var(--cat-primary), 0 0 40px var(--cat-primary); }
.glow-box { box-shadow: 0 0 20px var(--cat-glow), inset 0 0 20px rgba(0,0,0,0.5); }
.glow-border { border-color: var(--cat-primary) !important; box-shadow: 0 0 15px var(--cat-glow); }
.old-tech-active .glow-blue { text-shadow: 0 0 20px #B026FF, 0 0 40px #B026FF, 0 0 60px rgba(176,38,255,0.5); }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.6rem; padding: 0.85rem 2rem; border-radius: var(--r-md);
  font-family: var(--font-ui); font-weight: 700; font-size: 0.9rem;
  letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
  transition: all 0.25s var(--ease); position: relative; overflow: hidden; white-space: nowrap;
}
.btn::before {
  content: ''; position: absolute; inset: 0; opacity: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  transition: opacity 0.25s;
}
.btn:hover::before { opacity: 1; }

.btn-primary {
  background: var(--cat-primary); color: #fff;
  box-shadow: 0 0 25px var(--cat-glow), 0 4px 15px rgba(0,0,0,0.4);
}
.btn-primary:hover {
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 0 40px var(--cat-glow), 0 8px 25px rgba(0,0,0,0.5);
}
.btn-primary:active { transform: scale(0.98); }

.btn-outline {
  background: transparent; color: var(--cat-primary);
  border: 1.5px solid var(--cat-primary);
  box-shadow: 0 0 15px var(--cat-glow);
}
.btn-outline:hover {
  background: var(--cat-primary); color: #fff;
  box-shadow: 0 0 30px var(--cat-glow);
  transform: translateY(-2px);
}

.btn-ghost {
  background: rgba(255,255,255,0.05); color: var(--z-text);
  border: 1px solid var(--z-border);
}
.btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: var(--cat-primary); }

.btn-whatsapp {
  background: #25D366; color: #fff;
  box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
}
.btn-whatsapp:hover { background: #20BD5A; transform: translateY(-2px); box-shadow: 0 0 35px rgba(37,211,102,0.5); }

.btn-sm { padding: 0.6rem 1.25rem; font-size: 0.8rem; }
.btn-lg { padding: 1.1rem 2.5rem; font-size: 1rem; }
.btn-icon { width: 44px; height: 44px; padding: 0; border-radius: var(--r-md); }
.btn-full { width: 100%; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: var(--r-full);
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  font-family: var(--font-ui);
}
.badge--blue { background: rgba(0,102,255,0.15); color: #60A5FA; border: 1px solid rgba(0,102,255,0.3); }
.badge--orange { background: rgba(255,107,0,0.15); color: #FF9A4D; border: 1px solid rgba(255,107,0,0.3); }
.badge--green { background: rgba(57,255,20,0.1); color: #39FF14; border: 1px solid rgba(57,255,20,0.3); }
.badge--purple { background: rgba(176,38,255,0.15); color: #D070FF; border: 1px solid rgba(176,38,255,0.35); }
.badge--neon { background: #B026FF; color: #39FF14; border: 1px solid #39FF14; box-shadow: 0 0 10px rgba(57,255,20,0.4); }
.badge--gold { background: rgba(212,175,55,0.15); color: #D4AF37; border: 1px solid rgba(212,175,55,0.3); }
.badge--red { background: rgba(239,68,68,0.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
.badge--live { animation: livePulse 1.5s ease-in-out infinite; }
@keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

.card {
  background: var(--z-card);
  border: 1px solid var(--z-border);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: all 0.3s var(--ease);
  position: relative;
}
.card:hover {
  border-color: var(--cat-border, rgba(0,102,255,0.3));
  box-shadow: 0 0 30px rgba(0,0,0,0.3), 0 0 1px var(--cat-primary);
  transform: translateY(-3px);
}
.card::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent 50%);
  pointer-events: none;
}

.section-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--cat-primary); margin-bottom: 0.75rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.section-eyebrow::before { content: '//'; opacity: 0.5; font-family: var(--font-mono); }
.section-title {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 800; letter-spacing: -0.02em; line-height: 1.1;
  margin-bottom: 1rem;
}
.section-title .accent { color: var(--cat-primary); }
.section-subtitle { color: var(--z-text-muted); font-size: 1.05rem; max-width: 560px; }

.pixel-divider { height: 1px; margin: 0; background: linear-gradient(90deg, transparent, var(--cat-primary), transparent); }

.stars { display: flex; gap: 2px; }
.star { font-size: 0.8rem; }
.star.filled { color: #F59E0B; }
.star.empty { color: var(--z-text-subtle); }

.ticker { background: var(--cat-primary); padding: 0.4rem 0; overflow: hidden; position: relative; z-index: 100; }
.old-tech-active .ticker { background: #B026FF; border-bottom: 1px solid #39FF14; }
.ticker-inner { display: flex; white-space: nowrap; animation: ticker-scroll 20s linear infinite; }
.ticker-item {
  font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0 2.5rem; color: #fff; opacity: 0.9;
}
.ticker-sep { opacity: 0.4; }
@keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

#nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; transition: all 0.3s var(--ease); padding: 1rem 0; }
#nav.scrolled {
  background: rgba(8, 11, 18, 0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--z-border);
  padding: 0.7rem 0;
}
.old-tech-active #nav.scrolled { background: rgba(5, 0, 15, 0.94); border-bottom-color: rgba(176,38,255,0.2); }
.nav-inner { display: flex; align-items: center; gap: 1.5rem; height: 56px; }
.nav-logo {
  font-family: var(--font-display); font-size: 1.5rem; font-weight: 900;
  letter-spacing: 0.05em; color: var(--z-text);
  display: flex; align-items: center; gap: 0.4rem;
  flex-shrink: 0;
}
.nav-logo .logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--cat-primary);
  box-shadow: 0 0 10px var(--cat-glow);
  animation: logoPulse 2s ease-in-out infinite;
}
@keyframes logoPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
.nav-links { display: flex; align-items: center; gap: 0.25rem; flex: 1; justify-content: center; }
.nav-link {
  padding: 0.5rem 0.9rem; border-radius: var(--r-sm);
  font-family: var(--font-ui); font-size: 0.85rem; font-weight: 500;
  color: var(--z-text-muted); letter-spacing: 0.03em;
  transition: all 0.2s; position: relative;
}
.nav-link:hover, .nav-link.active { color: var(--z-text); }
.nav-link.active::after {
  content: ''; position: absolute; bottom: -2px; left: 50%; right: 50%;
  height: 2px; background: var(--cat-primary);
  transition: all 0.3s; left: 0.9rem; right: 0.9rem;
  box-shadow: 0 0 8px var(--cat-glow);
}
.nav-categories-btn {
  font-family: var(--font-ui); font-size: 0.85rem; font-weight: 500;
  color: var(--z-text-muted); padding: 0.5rem 0.9rem; border-radius: var(--r-sm);
  display: flex; align-items: center; gap: 0.3rem; cursor: pointer;
  transition: color 0.2s;
}
.nav-categories-btn:hover { color: var(--z-text); }
.nav-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
.nav-action-btn {
  width: 40px; height: 40px; border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--z-text-muted); background: rgba(255,255,255,0.04);
  border: 1px solid var(--z-border);
  transition: all 0.2s; position: relative;
}
.nav-action-btn:hover {
  color: var(--z-text); background: rgba(255,255,255,0.08);
  border-color: var(--cat-primary);
  box-shadow: 0 0 15px var(--cat-glow);
}
.nav-cart-count {
  position: absolute; top: -4px; right: -4px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--cat-primary); color: #fff;
  font-size: 0.65rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
}
.nav-search-bar {
  display: flex; align-items: center; gap: 0.5rem;
  background: rgba(255,255,255,0.04); border: 1px solid var(--z-border);
  border-radius: var(--r-md); padding: 0 1rem; width: 220px;
  transition: all 0.3s;
}
.nav-search-bar:focus-within { border-color: var(--cat-primary); width: 280px; box-shadow: 0 0 20px var(--cat-glow); }
.nav-search-bar input {
  background: none; border: none; outline: none;
  color: var(--z-text); font-size: 0.85rem; font-family: var(--font-arabic);
  padding: 0.5rem 0; width: 100%;
}
.nav-search-bar input::placeholder { color: var(--z-text-subtle); }
.mobile-menu-btn {
  display: none; width: 40px; height: 40px; border-radius: var(--r-md);
  background: rgba(255,255,255,0.04); border: 1px solid var(--z-border);
  color: var(--z-text); align-items: center; justify-content: center;
}

.cat-dropdown {
  position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  width: 600px; background: var(--z-surface);
  border: 1px solid var(--z-border); border-radius: var(--r-lg);
  padding: 1.25rem; display: none; gap: 0.75rem;
  grid-template-columns: 1fr 1fr;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  z-index: 1001;
}
.cat-dropdown.open { display: grid; animation: dropIn 0.2s var(--ease-out); }
@keyframes dropIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.cat-option {
  display: flex; align-items: center; gap: 1rem; padding: 1rem;
  border-radius: var(--r-md); border: 1px solid var(--z-border);
  cursor: pointer; transition: all 0.2s;
  background: rgba(255,255,255,0.02);
}
.cat-option:hover { border-color: var(--cat-primary); background: rgba(0,102,255,0.05); }
.cat-option.disabled { opacity: 0.4; cursor: not-allowed; }
.cat-icon { font-size: 1.8rem; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: var(--r-md); border: 1px solid var(--z-border); }
.cat-info h4 { font-family: var(--font-ui); font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem; }
.cat-info p { font-size: 0.75rem; color: var(--z-text-muted); }

#mobile-menu {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(5, 8, 18, 0.97); backdrop-filter: blur(20px);
  flex-direction: column; padding: 5rem 1.5rem 2rem;
  overflow-y: auto;
}
#mobile-menu.open { display: flex; animation: slideDown 0.3s var(--ease-out); }
@keyframes slideDown { from { opacity: 0; } to { opacity: 1; } }
.mobile-nav-link {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 0; border-bottom: 1px solid var(--z-border);
  font-family: var(--font-ui); font-size: 1.1rem; font-weight: 600; color: var(--z-text);
}
.mobile-nav-link:hover { color: var(--cat-primary); }

#hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 5rem; }
.hero-bg { position: absolute; inset: 0; z-index: 0; }
.hero-radial { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 50% at 50% 40%, rgba(0,102,255,0.12), transparent 70%); }
.old-tech-active .hero-radial { background: radial-gradient(ellipse 70% 50% at 50% 40%, rgba(176,38,255,0.15), transparent 70%); }
.hero-corner-accent { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); pointer-events: none; }
.hero-corner-accent--tl { top: -100px; right: -100px; background: rgba(0,102,255,0.08); }
.hero-corner-accent--br { bottom: -100px; left: -100px; background: rgba(0,207,255,0.06); }
.old-tech-active .hero-corner-accent--tl { background: rgba(176,38,255,0.12); }
.old-tech-active .hero-corner-accent--br { background: rgba(57,255,20,0.06); }

.hero-frame { position: absolute; inset: 20px; border: 1px solid rgba(0,102,255,0.08); border-radius: var(--r-xl); pointer-events: none; }
.hero-frame::before, .hero-frame::after { content: ''; position: absolute; width: 40px; height: 40px; border-color: var(--cat-primary); border-style: solid; }
.hero-frame::before { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 var(--r-md) 0 0; box-shadow: 2px -2px 10px var(--cat-glow); }
.hero-frame::after { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 var(--r-md); box-shadow: -2px 2px 10px var(--cat-glow); }

.hero-content { position: relative; z-index: 2; padding: 3rem 0; }
.hero-inner { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 4rem; }

.hero-eyebrow { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
.pixel-indicator { display: flex; gap: 3px; align-items: center; }
.pixel-dot { width: 6px; height: 6px; border-radius: 1px; background: var(--cat-primary); animation: pixelBlink 1.2s ease-in-out infinite; }
.pixel-dot:nth-child(2) { animation-delay: 0.2s; background: var(--cat-secondary); }
.pixel-dot:nth-child(3) { animation-delay: 0.4s; opacity: 0.5; }
@keyframes pixelBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.hero-status {
  font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--cat-primary);
  display: flex; align-items: center; gap: 0.5rem;
}
.hero-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #39FF14; box-shadow: 0 0 8px #39FF14; animation: livePulse 1.5s infinite; }

.hero-h1 {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 900; letter-spacing: -0.03em; line-height: 0.95;
  margin-bottom: 1.5rem; color: var(--z-text);
}
.hero-h1 .line-accent {
  background: var(--cat-gradient);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
}

.products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
